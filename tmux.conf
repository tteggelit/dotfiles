# Use Ctrl-x instead of Ctrl-b
set -g prefix C-x
unbind C-b
bind C-x send-prefix

# Show list of windows using Ctrl-x "
bind '"' choose-tree -w

# Rename window using Ctrl-x A
bind A command-prompt "rename-window '%%'"

# Enable mouse mode and scroll wheel
set -g mouse on
# --- Mouse Wheel Scrolling ---
bind -n WheelUpPane { \
  if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' { \
    send -M \
  } { \
    if -F '#{alternate_on}' { \
      send-keys -N 3 Up \
    } { \
      copy-mode -e \
    } \
  } \
}
bind -n WheelDownPane { \
  if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' { \
    send -M \
  } { \
    if -F '#{alternate_on}' { \
      send-keys -N 3 Down \
    } { \
      # If not in copy mode and alternate screen is off, do nothing or handle differently
    } \
  } \
}
